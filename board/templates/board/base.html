<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Organizador{% endblock %}</title>
    <style>
        :root {
            --bg: #0b1020;
            --bg-2: #11182e;
            --surface: #171f3a;
            --surface-2: #202b4a;
            --text: #e8eeff;
            --muted: #a8b5d7;
            --primary: #57d6c4;
            --primary-2: #26c6a7;
            --warn: #ffc86b;
            --line: #2b365c;
            --danger: #ff7a9e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(1200px 700px at 80% -15%, #254a94 0%, transparent 45%),
                radial-gradient(1000px 600px at -10% -20%, #12365d 0%, transparent 40%),
                linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 70%);
            color: var(--text);
            font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
            padding: 24px;
        }

        .container {
            width: min(1250px, 100%);
            margin: 0 auto;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(12, 18, 35, 0.65);
            backdrop-filter: blur(6px);
        }

        .brand {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: .4px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--line);
            background: var(--surface);
            padding: 8px 12px;
            border-radius: 10px;
            transition: background .15s ease, border-color .15s ease;
        }

        .nav-links a:hover {
            border-color: var(--primary);
            background: #1f2a4b;
        }

        .page-title {
            margin: 0 0 16px;
            font-size: clamp(1.5rem, 2.6vw, 2rem);
        }

        .panel {
            background: linear-gradient(165deg, rgba(33, 42, 72, 0.9), rgba(20, 27, 49, 0.95));
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 12px 30px rgba(2, 6, 20, 0.35);
        }

        input, textarea, select, button {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: #111a32;
            color: var(--text);
            padding: 10px;
            font: inherit;
        }

        input::placeholder,
        textarea::placeholder {
            color: #8d9bc3;
        }

        button {
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #051b17;
            font-weight: 700;
            transition: transform .12s ease, filter .12s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width: 760px) {
            body {
                padding: 14px;
            }

            .nav {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="container">
        <header class="nav">
            <div class="brand">TaskHub</div>
            <nav class="nav-links">
                <a href="{% url 'board:kanban' %}">Kanban</a>
                <a href="{% url 'board:documents' %}">Documentos</a>
            </nav>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
